<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canelé Studio | 進階店長後台</title>
    <style>
        body { font-family: 'PingFang TC', Arial, sans-serif; background-color: #F5F5F5; color: #333; padding: 20px; margin: 0; }
        .admin-container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; }
        .section-box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #4A3525; margin-top: 0; border-bottom: 2px solid #EFEBE4; padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; margin-top: 10px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #CCC; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        
        .flex-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .btn { background-color: #4A3525; color: white; padding: 10px 20px; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #35251A; }
        .btn-danger { background-color: #C84B31; }
        .btn-danger:hover { background-color: #A0321C; }
        .btn-sm { padding: 5px 10px; font-size: 0.85rem; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #DDD; padding: 12px; text-align: left; }
        th { background-color: #F8F6F2; color: #4A3525; }
        
        .order-list { max-height: 250px; overflow-y: auto; background: #FAF8F5; border: 1px solid #DDD; border-radius: 4px; padding: 10px; }
        .order-item { padding: 8px 0; border-bottom: 1px solid #EFEBE4; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="admin-container">

    <div class="section-box">
        <h2>品牌基本設定</h2>
        <div class="flex-row" style="align-items: flex-end;">
            <div style="flex: 1;">
                <label for="brandInput">網站品牌名稱：</label>
                <input type="text" id="brandInput" placeholder="輸入您的品牌名稱，例如：Canelé Studio">
            </div>
            <button class="btn" onclick="saveBrand()">儲存品牌名</button>
        </div>
    </div>

    <div class="section-box">
        <h2>🛠️ 每週口味與庫存管理</h2>
        <div class="flex-row">
            <div style="flex: 2;">
                <label>口味名稱：</label>
                <input type="text" id="prodName" placeholder="例如：開心果可麗露">
            </div>
            <div style="flex: 1;">
                <label>上架庫存顆數：</label>
                <input type="number" id="inputStock" placeholder="30">
            </div>
        </div>
        <input type="hidden" id="editIndex" value="-1">
        <button class="btn" id="addBtn" onclick="addOrUpdateProduct()">➕ 新增此口味商品</button>

        <h3>📋 當前上架品項列表</h3>
        <table>
            <thead>
                <tr>
                    <th>口味名稱</th>
                    <th>剩餘庫存</th>
                    <th style="width: 130px;">操作</th>
                </tr>
            </thead>
            <tbody id="productTableBody">
                </tbody>
        </table>
    </div>

    <div class="section-box">
        <h2>📥 本週訂單紀錄 (<span id="orderCount">0</span>筆)</h2>
        <div class="order-list" id="orderLog">暫無訂單...</div>
        <button class="btn btn-danger" style="margin-top: 20px;" onclick="clearAllData()">🧹 重置所有數據（換週清空）</button>
    </div>

</div>

<script>
    // 載入初始數據
    function initAdmin() {
        // 載入品牌名
        document.getElementById('brandInput').value = localStorage.getItem('canele_brand') || "Canelé Studio";
        
        renderProducts();
        renderOrders();
    }

    // 儲存品牌名稱
    function saveBrand() {
        const name = document.getElementById('brandInput').value.trim();
        if(!name) return alert('品牌名稱不能為空！');
        localStorage.setItem('canele_brand', name);
        alert('品牌名稱已同步更新至前台！');
    }

    // 新增或更新商品
    function addOrUpdateProduct() {
        const name = document.getElementById('prodName').value.trim();
        const stock = parseInt(document.getElementById('inputStock').value);
        const editIndex = parseInt(document.getElementById('editIndex').value);

        if (!name || isNaN(stock) || stock < 0) {
            return alert('請填寫正確的口味與庫存數量！');
        }

        let products = JSON.parse(localStorage.getItem('canele_products')) || [];

        if (editIndex === -1) {
            // 新增商品
            products.push({ name: name, stock: stock });
        } else {
            // 編輯商品
            products[editIndex] = { name: name, stock: stock };
            // 還原按鈕狀態
            document.getElementById('editIndex').value = "-1";
            document.getElementById('addBtn').innerText = "➕ 新增此口味商品";
        }

        localStorage.setItem('canele_products', JSON.stringify(products));
        
        // 清空欄位
        document.getElementById('prodName').value = "";
        document.getElementById('inputStock').value = "";
        
        renderProducts();
    }

    // 渲染商品表格
    function renderProducts() {
        const products = JSON.parse(localStorage.getItem('canele_products')) || [];
        const tbody = document.getElementById('productTableBody');
        tbody.innerHTML = "";

        if(products.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999;">目前沒有商品，請由上方新增</td></tr>`;
            return;
        }

        products.forEach((product, index) => {
            tbody.innerHTML += `
                <tr>
                    <td><b>${product.name}</b></td>
                    <td style="color:#C84B31; font-weight:bold;">${product.stock} 顆</td>
                    <td>
                        <button class="btn btn-sm" style="background-color:#666;" onclick="editProduct(${index})">編輯</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProduct(${index})">刪除</button>
                    </td>
                </tr>
            `;
        });
    }

    // 編輯商品（把舊資料塞回欄位）
    function editProduct(index) {
        const products = JSON.parse(localStorage.getItem('canele_products')) || [];
        document.getElementById('prodName').value = products[index].name;
        document.getElementById('inputStock').value = products[index].stock;
        document.getElementById('editIndex').value = index;
        document.getElementById('addBtn').innerText = "💾 儲存修改項目";
    }

    // 刪除單一商品
    function deleteProduct(index) {
        if(confirm('確定要刪除這個口味商品嗎？前台將會同步下架。')) {
            let products = JSON.parse(localStorage.getItem('canele_products')) || [];
            products.splice(index, 1);
            localStorage.setItem('canele_products', JSON.stringify(products));
            renderProducts();
        }
    }

    // 渲染訂單列表
    function renderOrders() {
        const orders = JSON.parse(localStorage.getItem('canele_orders')) || [];
        const logDiv = document.getElementById('orderLog');
        document.getElementById('orderCount').innerText = orders.length;

        if(orders.length === 0) {
            logDiv.innerHTML = "暫無訂單...";
            return;
        }

        logDiv.innerHTML = "";
        // 倒序顯示最新訂單
        [...orders].reverse().forEach(order => {
            logDiv.innerHTML += `
                <div class="order-item">
                    [${order.time}] 顧客 <b>${order.name}</b> (${order.phone}) 訂購了 
                    <span style="color:#C84B31;font-weight:bold">${order.qty} 顆</span> — ${order.flavor}
                </div>
            `;
        });
    }

    // 換週清空全部
    function clearAllData() {
        if(confirm('⚠️ 注意：這會清空所有的商品品項與本週訂單紀錄！確定要執行嗎？')) {
            localStorage.clear(); // 徹底清空快取
            initAdmin();
            alert('數據已清空，您可以開始建立下一週的新口味了！');
        }
    }

    window.onload = initAdmin;
    setInterval(renderOrders, 3000);
</script>
</body>
</html>
