<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilou 預購系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#F4F6F9] text-[#222222] min-h-screen font-sans">

    <script>
        // ⚠️ 這裡請填入你在 Google Apps Script 部署得到的網頁應用程式網址
        const API_URL = "https://script.google.com/macros/s/AKfycbwbbwSO3VsgZdMZZ9NeVrp6T7Zkqla6GAq5Ge9LsKkcCoo_T1LnjO0wLS1XCBOAgOO_pQ/exec";
        let shippingFee = 160; 
        let cart = []; 
        let localProducts = [];
        let localPackaging = [];
    </script>

    <nav class="bg-[#5B7290] text-white p-5 shadow-sm sticky top-0 z-50">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <h1 id="txtShopName" class="text-2xl font-bold tracking-widest">Lilou</h1>
            <span class="text-sm border border-white/40 px-4 py-1.5 rounded-full text-white/90 tracking-wider font-medium">ONLINE SHOP</span>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:py-12 space-y-8">
        
        <section class="space-y-8">
            <div class="text-center py-4">
                <h2 id="txtMainTitle" class="text-4xl font-black text-[#222222] tracking-wider mb-4">Lilou</h2>
                <p id="txtSubTitle" class="text-stone-600 text-base md:text-lg tracking-wide max-w-xl mx-auto leading-relaxed">網頁簡介載入中...</p>
            </div>

            <div class="bg-white p-5 md:p-10 rounded-2xl shadow-xs border border-stone-100">
                <h3 class="text-lg font-extrabold text-[#5B7290] tracking-widest border-b-2 border-stone-100 pb-3.5 mb-6 uppercase">Step 01. 挑選口味與指定包裝</h3>
                <div id="productMenu" class="space-y-2">
                    <p class="text-stone-400 text-center py-6 text-base">商品加載中...</p>
                </div>
            </div>

            <form id="orderForm" class="bg-white p-6 md:p-10 rounded-2xl shadow-xs border border-stone-100 space-y-8" onsubmit="handleOrderSubmit(event)">
                
                <div>
                    <h3 class="text-lg font-extrabold text-[#5B7290] tracking-widest border-b-2 border-stone-100 pb-3.5 mb-6 uppercase">Step 02. 確認購物明細</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-base min-w-[500px]">
                            <thead>
                                <tr class="border-b border-stone-200 text-stone-500 font-bold">
                                    <th class="p-3 pl-0">品項與指定包裝</th>
                                    <th class="p-3 w-20">單價</th>
                                    <th class="p-3 w-20 text-center">數量</th>
                                    <th class="p-3 w-24">小計 (含包裝)</th>
                                    <th class="p-3 w-12 text-center"></th>
                                </tr>
                            </thead>
                            <tbody id="cartTableBody" class="divide-y divide-stone-100">
                                <tr>
                                    <td colspan="5" class="p-8 text-center text-stone-400 text-base">購物車目前是空的，請由上方挑選口味</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="space-y-6 pt-4">
                    <h3 class="text-lg font-extrabold text-[#5B7290] tracking-widest border-b-2 border-stone-100 pb-3.5 mb-6 uppercase">Step 03. 填寫訂購資訊</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-black uppercase tracking-wider text-stone-700 mb-2">訂購人姓名 *</label>
                            <input type="text" id="custName" class="w-full p-4 border border-stone-300 rounded-xl text-base focus:outline-none focus:border-[#5B7290] focus:ring-1 focus:ring-[#5B7290] h-14" placeholder="請輸入姓名" required>
                        </div>
                        <div>
                            <label class="block text-sm font-black uppercase tracking-wider text-stone-700 mb-2">聯絡電話 *</label>
                            <input type="tel" id="custPhone" class="w-full p-4 border border-stone-300 rounded-xl text-base focus:outline-none focus:border-[#5B7290] focus:ring-1 focus:ring-[#5B7290] h-14" placeholder="請輸入手機號碼" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-black uppercase tracking-wider text-stone-700 mb-2 text-[#5B7290]">取貨/寄送日期 *</label>
                            <select id="shipDate" class="w-full p-4 border border-stone-300 rounded-xl text-base focus:outline-none focus:border-[#5B7290] focus:ring-1 focus:ring-[#5B7290] bg-white font-bold text-stone-800 cursor-pointer h-14" required>
                                </select>
                        </div>
                        <div>
                            <label class="block text-sm font-black uppercase tracking-wider text-stone-700 mb-2">配送方式 *</label>
                            <select id="shipMethod" class="w-full p-4 border border-stone-300 rounded-xl text-base focus:outline-none focus:border-[#5B7290] focus:ring-1 focus:ring-[#5B7290] cursor-pointer h-14" onchange="toggleAddress()" required>
                                <option value="store">門市自取 (免運費)</option>
                                <option value="delivery">黑貓宅配 (運費另計)</option>
                            </select>
                        </div>
                    </div>

                    <div id="addressGroup" class="hidden transition-all duration-300">
                        <label class="block text-sm font-black uppercase tracking-wider text-stone-700 mb-2">宅配收件地址 *</label>
                        <input type="text" id="custAddress" class="w-full p-4 border border-stone-300 rounded-xl text-base focus:outline-none focus:border-[#5B7290] focus:ring-1 focus:ring-[#5B7290] h-14" placeholder="請填寫完整收件地址">
                    </div>

                    <div>
                        <label class="block text-sm font-black uppercase tracking-wider text-stone-700 mb-2">備註說明</label>
                        <textarea id="orderNote" rows="3" class="w-full p-4 border border-stone-300 rounded-xl text-base focus:outline-none focus:border-[#5B7290] focus:ring-1 focus:ring-[#5B7290]" placeholder="若有特殊包裝分裝想法，也可在此註記說明喔！"></textarea>
                    </div>
                </div>

                <div class="bg-stone-50 p-6 rounded-xl space-y-2 text-right text-stone-600 text-sm tracking-wide border border-stone-100">
                    <div>商品與包裝總計 Subtotal: <span id="subtotalDisplay" class="font-bold text-base text-stone-800">$0</span></div>
                    <div id="shipFeeDisplay" class="hidden">宅配運費 Shipping: <span class="font-bold text-base text-stone-800">+$160</span></div>
                    <div class="text-[#222222] font-black text-2xl pt-3 border-t border-stone-200 mt-3">
                        總金額 Total：<span id="totalDisplay" class="text-2xl font-black text-[#5B7290]">$0</span>
                    </div>
                </div>

                <button type="submit" class="w-full bg-[#5B7290] text-white font-extrabold tracking-widest p-4.5 rounded-xl hover:bg-[#3E4F66] transition-colors duration-200 shadow-md cursor-pointer text-base uppercase">
                    送出預購訂單 Submit Order
                </button>
            </form>
        </section>
    </main>

    <script>
        function toggleAddress() {
            const method = document.getElementById('shipMethod').value;
            const addrGroup = document.getElementById('addressGroup');
            const addrInput = document.getElementById('custAddress');
            const shipFeeDisplay = document.getElementById('shipFeeDisplay');
            
            if(method === 'delivery') {
                addrGroup.classList.remove('hidden');
                addrInput.required = true;
                shipFeeDisplay.classList.remove('hidden');
                shipFeeDisplay.querySelector('span').innerText = `+$${shippingFee}`;
            } else {
                addrGroup.classList.add('hidden');
                addrInput.required = false;
                addrInput.value = "";
                shipFeeDisplay.classList.add('hidden');
            }
            calculateTotal();
        }

        function parseAndRenderCustomDates(dateString) {
            const dateSelect = document.getElementById('shipDate');
            let optionsHtml = `<option value="" disabled selected>-- 請選擇取貨/寄送日期 --</option>`;
            
            if(dateString && dateString.trim() !== "") {
                const dateArr = dateString.split(',');
                dateArr.forEach(dStr => {
                    const cleanDate = dStr.trim();
                    if(cleanDate !== "") {
                        const parts = cleanDate.split('-');
                        if(parts.length === 3) {
                            const dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
                            const weekday = ["日", "一", "二", "三", "四", "五", "六"][dateObj.getDay()];
                            optionsHtml += `<option value="${cleanDate}">${cleanDate} (星期${weekday})</option>`;
                        } else {
                            optionsHtml += `<option value="${cleanDate}">${cleanDate}</option>`;
                        }
                    }
                });
            } else {
                optionsHtml = `<option value="" disabled>目前無開放日期，請聯繫店家</option>`;
            }
            dateSelect.innerHTML = optionsHtml;
        }

        async function fetchOptions() {
            try {
                const res = await fetch(`${API_URL}?action=getFormOptions`);
                const data = await res.json();
                localProducts = data.products;
                localPackaging = data.packaging;
                
                let rawDateSetting = "";

                if(data.settings) {
                    document.getElementById('txtShopName').innerText = data.settings.shop_name || "Lilou";
                    document.getElementById('txtMainTitle').innerText = data.settings.main_title || "Lilou 可麗露預購";
                    document.getElementById('txtSubTitle').innerText = data.settings.sub_title || "挑選喜愛的口味與包裝放入購物車";
                    document.title = data.settings.main_title || "Lilou 可麗露預購";
                    rawDateSetting = data.settings.available_dates || "";
                }

                // 渲染口味清單（加入為每個商品獨立挑選包裝的選單）
                const pMenu = document.getElementById('productMenu');
                if(localProducts.length === 0) {
                    pMenu.innerHTML = `<p class="text-stone-400 text-center py-6 text-base">目前沒有開放預購的口味喔！</p>`;
                } else {
                    pMenu.innerHTML = localProducts.map((p, idx) => {
                        const isOut = p.stock <= 0;
                        
                        // 生成該品項專屬的包裝選單
                        const packOptionsHtml = localPackaging.map(pack => 
                            `<option value="${pack.name}" data-extra="${pack.extra_price}">${pack.name} (+$${pack.extra_price})</option>`
                        ).join('');

                        return `
                        <div class="flex flex-col md:flex-row md:items-center justify-between py-5 border-b border-stone-100 last:border-0 gap-3">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-baseline flex-wrap gap-2">
                                    <span class="font-extrabold text-stone-900 text-lg tracking-wide break-words">${p.name}</span>
                                    <span class="text-[#5B7290] font-black text-lg">$${p.price}</span>
                                </div>
                                <p class="text-xs ${isOut ? 'text-red-500 font-bold' : 'text-stone-400 mt-0.5'}">庫存：${p.stock} 顆 ${isOut ? '(售罄)' : ''}</p>
                            </div>
                            
                            <div class="flex flex-wrap items-center gap-2 bg-stone-50 md:bg-transparent p-3 md:p-0 rounded-xl justify-between md:justify-end">
                                <select id="prodPack_${idx}" ${isOut ? 'disabled' : ''} class="text-sm p-2 border border-stone-300 rounded-xl bg-white focus:outline-none focus:border-[#5B7290] h-10 max-w-[180px] font-medium cursor-pointer">
                                    <option value="" disabled selected>-- 指定此品項包裝 --</option>
                                    ${packOptionsHtml}
                                </select>
                                <div class="flex items-center gap-2">
                                    <input type="number" id="qty_${idx}" min="1" max="${p.stock}" value="1" ${isOut ? 'disabled' : ''} class="w-12 p-2 border border-stone-200 rounded-xl text-center text-sm font-bold bg-white focus:outline-none focus:border-[#5B7290] h-10">
                                    <button type="button" onclick="addToCartAdvanced(${idx})" ${isOut ? 'disabled' : ''} class="bg-[#5B7290] text-white text-xs font-bold px-3 py-2 rounded-xl hover:bg-[#3E4F66] disabled:bg-stone-200 disabled:text-stone-400 cursor-pointer h-10 shrink-0">加購物車</button>
                                </div>
                            </div>
                        </div>`;
                    }).join('');
                }

                parseAndRenderCustomDates(rawDateSetting);
                renderCart();
            } catch (err) {
                alert("數據載入失敗，請確認 Apps Script 網址是否正確。");
            }
        }

        // 💡 新版購物車：改以「口味 + 指定包裝」作為唯一的商品 Key
        function addToCartAdvanced(idx) {
            const product = localProducts[idx];
            const packSelect = document.getElementById(`prodPack_${idx}`);
            
            if(packSelect.value === "") {
                alert(`請先為「${product.name}」選擇欲搭配的包裝盒/袋方式喔！`);
                return;
            }

            const selectedPackName = packSelect.value;
            const selectedPackExtra = parseInt(packSelect.selectedOptions[0].getAttribute('data-extra')) || 0;
            const inputQty = parseInt(document.getElementById(`qty_${idx}`).value) || 1;
            
            if(inputQty > product.stock) { alert(`超過庫存上限！`); return; }
            
            // 檢查購物車中是否已有「同口味、且同包裝」的項目
            const existingItem = cart.find(item => item.name === product.name && item.packName === selectedPackName);
            
            // 算一下該口味在購物車累積的總顆數，不能超過總庫存
            const totalQtyInCartForProd = cart.filter(item => item.name === product.name).reduce((sum, item) => sum + item.quantity, 0);
            if((totalQtyInCartForProd + inputQty) > product.stock) {
                alert(`此口味在購物車的累計總數將會超過庫存上限！`);
                return;
            }

            if(existingItem) {
                existingItem.quantity += inputQty;
            } else {
                cart.push({
                    name: product.name,
                    price: product.price,
                    packName: selectedPackName,
                    packExtra: selectedPackExtra,
                    quantity: inputQty
                });
            }
            alert(`已加入購物車：\n${product.name} x ${inputQty} 顆\n[包裝：${selectedPackName}]`);
            renderCart();
        }

        function removeFromCart(cartIdx) { cart.splice(cartIdx, 1); renderCart(); }

        function renderCart() {
            const cBody = document.getElementById('cartTableBody');
            if(cart.length === 0) {
                cBody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-stone-400 text-base">購物車目前空空如也，請從上方加入商品</td></tr>`;
                calculateTotal(); return;
            }
            cBody.innerHTML = cart.map((item, i) => {
                const singleCost = item.price;
                const totalItemPrice = (singleCost * item.quantity) + item.packExtra; // 商品總價 + 該盒包裝加價
                return `
                <tr class="text-stone-700 text-sm md:text-base">
                    <td class="py-4 pr-2">
                        <div class="font-bold text-stone-900">${item.name}</div>
                        <div class="text-xs text-[#5B7290] font-semibold mt-0.5">📦 包裝：${item.packName} (+$${item.packExtra})</div>
                    </td>
                    <td class="py-4 text-stone-500 font-medium">$${item.price}</td>
                    <td class="py-4 font-semibold text-center">${item.quantity} 顆</td>
                    <td class="py-4 font-bold text-stone-900">$${totalItemPrice}</td>
                    <td class="py-4 text-center"><button type="button" onclick="removeFromCart(${i})" class="text-stone-400 hover:text-red-500 font-black text-base transition-colors cursor-pointer px-2">✕</button></td>
                </tr>
            `}).join('');
            calculateTotal();
        }

        function calculateTotal() {
            let subtotal = 0;
            cart.forEach(item => {
                subtotal += (item.price * item.quantity) + item.packExtra;
            });
            
            document.getElementById('subtotalDisplay').innerText = `$${subtotal}`;
            const shipMethod = document.getElementById('shipMethod').value;
            let finalTotal = subtotal;
            if(shipMethod === 'delivery') finalTotal += shippingFee;
            document.getElementById('totalDisplay').innerText = `$${finalTotal}`;
            return finalTotal;
        }

        async function handleOrderSubmit(e) {
            e.preventDefault();
            if(cart.length === 0) { alert("購物車內尚無任何商品！"); return; }

            // 整合商品摘要與包裝清單
            const prodSummary = cart.map(item => `${item.name}(${item.quantity}顆)[${item.packName}]`).join('、');
            const packSummary = Array.from(new Set(cart.map(item => item.packName))).join('、');
            const totalQty = cart.reduce((acc, item) => acc + item.quantity, 0);

            const orderData = {
                action: "submitOrder",
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                date: document.getElementById('shipDate').value,
                shipping_method: document.getElementById('shipMethod').value === 'store' ? "門市自取" : "黑貓宅配",
                address: document.getElementById('custAddress').value,
                product_name: prodSummary,
                quantity: totalQty,
                packaging_name: packSummary,
                total_price: calculateTotal(),
                note: document.getElementById('orderNote').value
            };

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(orderData) });
                const result = await res.json();
                if(result.status === "success") {
                    alert("🎉 預購單送出成功！已為您保留數量與包裝。");
                    cart = [];
                    document.getElementById('orderForm').reset();
                    document.getElementById('addressGroup').classList.add('hidden');
                    document.getElementById('shipFeeDisplay').classList.add('hidden');
                    fetchOptions();
                }
            } catch(err) { alert("送出訂單時發生錯誤，請稍後再試。"); }
        }

        fetchOptions();
    </script>
</body>
</html>
