<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每週限量可麗露團購</title>
    <style>
        :root {
            --primary-color: #4A3525; 
            --accent-color: #8A9A86;  
            --bg-color: #FDFBF7;
            --text-color: #2B2520;
        }
        body { font-family: 'PingFang TC', Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0 20px 0; }
        header h1 { color: var(--primary-color); font-size: 2.2rem; margin-bottom: 5px; letter-spacing: 2px; }
        header p { color: #7A6E65; font-size: 1rem; }
        .notice-box { background-color: #F3EFE9; border-left: 4px solid var(--primary-color); padding: 15px; border-radius: 4px; margin-bottom: 30px; font-size: 0.9rem; }
        
        /* 多商品卡片 */
        .product-list { display: flex; flex-direction: column; gap: 25px; }
        .product-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(74, 53, 37, 0.05); padding: 25px; border: 1px solid #EFEBE4; text-align: left; }
        .flavor-badge { background-color: var(--accent-color); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .product-title { font-size: 1.4rem; color: var(--primary-color); margin: 0 0 5px 0; }
        .stock-info { font-size: 1rem; color: #C84B31; font-weight: bold; margin-bottom: 15px; }
        
        .order-row { display: flex; gap: 10px; align-items: flex-end; margin-top: 15px; }
        .form-group { flex: 1; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: var(--primary-color); }
        .order-row select, .order-row input { width: 100%; padding: 10px; border: 1px solid #DDD6CE; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
        
        .buy-btn { background-color: var(--primary-color); color: white; padding: 10px 20px; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; white-space: nowrap; height: 40px; }
        .buy-btn:hover { background-color: #35251A; }
        .buy-btn:disabled { background-color: #BDBCB9; cursor: not-allowed; }
        .no-product { text-align: center; color: #888; padding: 40px; background: #FFF; border-radius: 12px; border: 1px dashed #DDD; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="brandName">Canelé Studio</h1>
        <p>法式每週限量手作可麗露</p>
    </header>

    <div class="notice-box">
        <strong>💡 訂購須知：</strong><br>
        1. 每週固定限量，售完為止。<br>
        2. 本表單為「線下自取」登記，請於自取時現場付款。<br>
        3. 自取地點：工作室（每週六 14:00 - 18:00 開放）。
    </div>

    <div class="product-list" id="productContainer">
        </div>
</div>

<script>
    // 初始化前台網頁
    function renderPage() {
        // 更新品牌名稱
        const savedBrand = localStorage.getItem('canele_brand') || "Canelé Studio";
        document.getElementById('brandName').innerText = savedBrand;
        document.title = savedBrand + " | 每週限量可麗露團購";

        // 讀取商品列表
        const products = JSON.parse(localStorage.getItem('canele_products')) || [];
        const container = document.getElementById('productContainer');
        container.innerHTML = "";

        if (products.length === 0) {
            container.innerHTML = `<div class="no-product">目前沒有開放訂購的口味，請稍後再試！</div>`;
            return;
        }

        products.forEach((product, index) => {
            const isSoldOut = product.stock <= 0;
            const btnText = isSoldOut ? "已售完" : "下單預訂";
            const btnDisabled = isSoldOut ? "disabled" : "";

            // 動態產生每個口味的字串
            container.innerHTML += `
                <div class="product-card">
                    <span class="flavor-badge">每週限量</span>
                    <h2 class="product-title">${product.name}</h2>
                    <div class="stock-info">剩餘數量：${product.stock} 顆</div>
