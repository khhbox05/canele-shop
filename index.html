<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lilou 預購系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --brand-color: #5B7290;       
            --brand-dark: #3E4F66;        
            --brand-bg: #F4F6F9;          
            --brand-text-dark: #222222;   
        }
        /* 針對手機瀏覽器優化點擊高亮與輸入框外觀 */
        input, select, textarea {
            -webkit-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body class="bg-[#F4F6F9] text-[#222222] min-h-screen font-sans antialiased selection:bg-[#5B7290]/20">

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzAIcNDGVm200Du_lGcAqV649dIqsLGDOLDkd6fWnUE1K7EA5sH-m2Z4RNdOVk4KKHB/exec";
        
        let shippingFee = 160; 
        let cart = []; 
        let localProducts = []; 
        let localPackaging = [];
        let localCoupons = []; 
        let currentBoxLimit = null; 

        let localPickupDates = []; 
        let localDeliveryDates = []; 
        let appliedCoupon = null; 
    </script>

    <nav class="bg-[#5B7290] text-white p-4 shadow-sm sticky top-0 z-50 backdrop-blur-md bg-opacity-95">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-widest">Lilou</h1>
            <span class="text-xs border border-white/40 px-3 py-1 rounded-full text-white/90 tracking-wider font-medium">ONLINE SHOP</span>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:py-10 space-y-6">
        
        <section class="space-y-6">
            <div class="text-center py-2 space-y-2">
                <h2 class="text-2xl md:text-3xl font-black text-[#222222] tracking-wider">本週限量甜點預購</h2>
                <p class="text-stone-500 text-xs md:text-sm tracking-wide max-w-sm mx-auto leading-relaxed">客製化挑選您的精緻組合，每週限量供應。</p>
            </div>

            <div class="bg-white p-4 md:p-8 rounded-2xl shadow-xs border border-stone-100 space-y-5">
                <div class="flex items-center gap-2 border-b border-stone-100 pb-3 mb-1">
                    <span class="bg-[#5B7290] text-white text-xs font-black px-2 py-0.5 rounded">01</span>
                    <h3 class="text-sm font-black text-[#5B7290] tracking-widest uppercase">客製化您的組合</h3>
                </div>
                
                <div class="space-y-2">
                    <div class="flex justify-between items-baseline">
                        <label class="block text-xs font-bold uppercase tracking-wider text-stone-600">1. 請先挑選包裝類型 *</label>
                        <span id="boxLimitTip" class="text-xs font-black text-[#5B7290]"></span>
                    </div>
                    <select id="boxSelect" class="w-full px-3 border border-stone-200 rounded-xl bg-stone-50 focus:outline-none focus:border-[#5B7290] focus:ring-1 focus:ring-[#5B7290] text-sm font-bold cursor-pointer h-12" onchange="handleBoxChange()">
                        <option value="" disabled selected>📦 庫存查詢中...</option>
                    </select>
                </div>

                <div id="flavorSection" class="space-y-4 pt-3 border-t border-stone-100">
                    <div class="flex justify-between items-center">
                        <label class="block text-xs font-bold uppercase tracking-wider text-stone-600">2. 請挑選組合內口味與數量：</label>
                        <span id="currentBoxCountDisplay" class="text-xs font-black text-stone-700 bg-stone-100 px-2 py-1 rounded-md">準備中...</span>
                    </div>
                    
                    <div id="flavorMenu" class="space-y-1 divide-y divide-stone-100">
                        <div class="animate-pulse flex items-center justify-between py-3.5">
                            <div class="h-4 bg-stone-200 rounded-md w-1/3"></div>
                            <div class="flex items-center gap-3"><div class="h-3 bg-stone-200 rounded-md w-10"></div><div class="h-8 bg-stone-200 rounded-lg w-14"></div></div>
                        </div>
                        <div class="animate-pulse flex items-center justify-between py-3.5">
                            <div class="h-4 bg-stone-200 rounded-md w-1/4"></div>
                            <div class="flex items-center gap-3"><div class="h-3 bg-stone-200 rounded-md w-10"></div><div class="h-8 bg-stone-200 rounded-lg w-14"></div></div>
                        </div>
                    </div>
                    
                    <div class="pt-2">
                        <button type="button" onclick="packBoxToCart()" class="w-full bg-stone-300 text-white font-extrabold tracking-widest h-12 rounded-xl text-sm uppercase shadow-xs cursor-not-allowed transition-all duration-200 active:scale-[0.99]" id="packBtn" disabled>
                            正在同步最新庫存中...
                        </button>
                    </div>
                </div>
            </div>

            <form id="orderForm" class="bg-white p-4 md:p-8 rounded-2xl shadow-xs border border-stone-100 space-y-6" onsubmit="handleOrderSubmit(event)">
                
                <div class="space-y-4">
                    <div class="flex items-center gap-2 border-b border-stone-100 pb-3">
                        <span class="bg-[#5B7290] text-white text-xs font-black px-2 py-0.5 rounded">02</span>
                        <h3 class="text-sm font-black text-[#5B7290] tracking-widest uppercase">確認已打包的組合明細</h3>
                    </div>
                    <div id="cartListContainer" class="space-y-2.5">
                        <p class="text-stone-400 text-center py-6 text-xs">購物車目前空空的喔！</p>
                    </div>
                </div>

                <div class="space-y-4 pt-2">
                    <div class="flex items-center gap-2 border-b border-stone-100 pb-3">
                        <span class="bg-[#5B7290] text-white text-xs font-black px-2 py-0.5 rounded">03</span>
                        <h3 class="text-sm font-black text-[#5B7290] tracking-widest uppercase">填寫訂購資訊</h3>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-stone-600 mb-1.5">訂購人姓名 *</label>
                            <input type="text" id="custName" class="w-full px-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-[#5B7290] h-12 bg-stone-50/50" placeholder="請輸入姓名" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-stone-600 mb-1.5">聯絡電話 *</label>
                            <input type="tel" id="custPhone" class="w-full px-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-[#5B7290] h-12 bg-stone-50/50" placeholder="請輸入手機號碼" required>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-stone-600 mb-1.5">配送方式 *</label>
                            <select id="shipMethod" class="w-full px-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-[#5B7290] cursor-pointer h-12 bg-stone-50/50" onchange="handleShippingMethodChange()" required>
                                <option value="store">門市自取 (免運費)</option>
                                <option value="delivery">黑貓宅配 (運費另計)</option>
                            </select>
                        </div>
                        <div>
                            <label id="dateLabel" class="block text-xs font-bold text-[#5B7290] mb-1.5">門市自取日期 *</label>
                            <select id="shipDate" class="w-full px-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-[#5B7290] bg-white font-bold text-stone-800 cursor-pointer h-12" required>
                                <option value="" disabled selected>正在載入可用日期...</option>
                            </select>
                        </div>
                    </div>

                    <div id="addressGroup" class="hidden transition-all duration-300">
                        <label class="block text-xs font-bold text-stone-600 mb-1.5">宅配收件地址 *</label>
                        <input type="text" id="custAddress" class="w-full px-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-[#5B7290] h-12 bg-stone-50/50" placeholder="請填寫完整收件地址">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-stone-600 mb-1.5">折扣碼 (選填)</label>
                        <div class="flex gap-2">
                            <input type="text" id="couponInput" class="flex-1 px-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-[#5B7290] h-12 bg-stone-50/50 uppercase" placeholder="請輸入折扣碼">
                            <button type="button" onclick="applyCouponCode(true)" class="bg-[#5B7290] text-white font-bold px-4 rounded-xl hover:bg-[#3E4F66] active:scale-[0.97] transition-all text-sm shrink-0 cursor-pointer h-12">
                                套用
                            </button>
                        </div>
                        <p id="couponMessage" class="text-xs font-bold mt-1.5 hidden"></p>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-stone-600 mb-1.5">備註說明</label>
                        <textarea id="orderNote" rows="2" class="w-full p-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-[#5B7290] bg-stone-50/50" placeholder="若有特殊需求請在此註記"></textarea>
                    </div>
                </div>

                <div class="bg-stone-50 p-4 rounded-xl space-y-1.5 text-right text-stone-500 text-xs tracking-wide border border-stone-100">
                    <div>商品總計 Subtotal: <span id="subtotalDisplay" class="font-bold text-stone-700">$0</span></div>
                    <div id="shipFeeDisplay" class="hidden">宅配運費 Shipping: <span class="font-bold text-stone-700">+$160</span></div>
                    <div id="couponDiscountDisplay" class="hidden text-red-500 font-bold">折扣折抵 Discount: <span>-$0</span></div>
                    
                    <div class="text-[#222222] font-black text-xl pt-2.5 border-t border-stone-200 mt-2">
                        總金額 Total：<span id="totalDisplay" class="text-xl font-black text-[#5B7290]">$0</span>
                    </div>
                </div>

                <button type="submit" class="w-full bg-[#5B7290] text-white font-extrabold tracking-widest h-14 rounded-xl hover:bg-[#3E4F66] active:scale-[0.98] transition-all duration-150 shadow-sm cursor-pointer text-base uppercase">
                    送出預購訂單 Submit Order
                </button>
            </form>
        </section>
    </main>

    <script>
        function handleShippingMethodChange() {
            const method = document.getElementById('shipMethod').value;
            const addrGroup = document.getElementById('addressGroup');
            const addrInput = document.getElementById('custAddress');
            const shipFeeDisplay = document.getElementById('shipFeeDisplay');
            const dateLabel = document.getElementById('dateLabel');
            
            if(method === 'delivery') {
                addrGroup.classList.remove('hidden');
                addrInput.required = true;
                shipFeeDisplay.classList.remove('hidden');
                shipFeeDisplay.querySelector('span').innerText = `+$${shippingFee}`;
                dateLabel.innerText = "希望到貨日期 *";
            } else {
                addrGroup.classList.add('hidden');
                addrInput.required = false;
                addrInput.value = "";
                shipFeeDisplay.classList.add('hidden');
                dateLabel.innerText = "門市自取日期 *";
            }
            
            renderAvailableDates(method);
            calculateTotal();
        }

        function renderAvailableDates(method) {
            const dateSelect = document.getElementById('shipDate');
            const textPrompt = method === 'delivery' ? '希望到貨日期' : '自取日期';
            const targetDates = method === 'delivery' ? localDeliveryDates : localPickupDates;
            
            let optionsHtml = `<option value="" disabled selected>-- 請選擇${textPrompt} --</option>`;
            
            if(targetDates && targetDates.length > 0 && targetDates[0] !== "") {
                targetDates.forEach(dateStr => {
                    const cleanDate = dateStr.trim();
                    if(cleanDate !== "") {
                        let weekdayStr = "";
                        try {
                            const parsedDate = new Date(cleanDate);
                            if(!isNaN(parsedDate)) {
                                const weekday = ["日", "一", "二", "三", "四", "五", "六"][parsedDate.getDay()];
                                weekdayStr = ` (週${weekday})`;
                            }
                        } catch(e){}
                        optionsHtml += `<option value="${cleanDate}">${cleanDate}${weekdayStr}</option>`;
                    }
                });
            } else {
                optionsHtml += `<option value="" disabled>暫無可選日期</option>`;
            }
            dateSelect.innerHTML = optionsHtml;
        }

        async function fetchOptions() {
            const CACHE_KEY = "lilou_shop_fast_cache";
            const cached = localStorage.getItem(CACHE_KEY);
            
            if (cached) {
                try { renderUIWithData(JSON.parse(cached)); } catch(e) {}
            }

            try {
                const cacheBuster = `&_=${new Date().getTime()}`;
                const res = await fetch(`${API_URL}?action=getFormOptions${cacheBuster}`);
                const data = await res.json();
                
                localStorage.setItem(CACHE_KEY, JSON.stringify(data));
                renderUIWithData(data);
            } catch (err) {
                console.error("同步失敗", err);
                if (!localStorage.getItem(CACHE_KEY)) {
                    alert("數據載入失敗，請確認網路連線。");
                }
            }
        }

        function renderUIWithData(data) {
            localProducts = data.products;
            localPackaging = data.packaging;
            localCoupons = data.coupons || []; 
            
            if(data.settings) {
                if(data.settings.pickup_available_dates) localPickupDates = data.settings.pickup_available_dates.toString().replace(/^"|"$/g, '').split(',');
                if(data.settings.delivery_available_dates) localDeliveryDates = data.settings.delivery_available_dates.toString().replace(/^"|"$/g, '').split(',');
            }

            const boxSelect = document.getElementById('boxSelect');
            const savedVal = boxSelect.value;
            
            boxSelect.innerHTML = `<option value="" disabled selected>-- 請選擇包裝樣式 --</option>` + localPackaging.map(p => 
                `<option value="${p.name}" data-extra="${p.extra_price}">${p.name} (+$${p.extra_price})</option>`
            ).join('');

            if(savedVal) boxSelect.value = savedVal;
            
            const packBtn = document.getElementById('packBtn');
            packBtn.className = "w-full bg-[#5B7290] text-white font-extrabold tracking-widest h-12 rounded-xl hover:bg-[#3E4F66] active:scale-[0.99] transition-all text-sm uppercase shadow-xs cursor-pointer";
            packBtn.innerText = "確定組合，打包放入購物車";
            packBtn.disabled = false;
            
            if (!savedVal) {
                document.getElementById('currentBoxCountDisplay').innerText = "當前已選: 0 個";
            }

            handleShippingMethodChange();
            renderFlavorMenu();
            renderCart();
        }

        function renderFlavorMenu() {
            const fMenu = document.getElementById('flavorMenu');
            fMenu.innerHTML = localProducts.map((p, idx) => {
                let occupiedInCart = 0;
                cart.forEach(savedBox => {
                    const matchFlavor = savedBox.flavors.find(f => f.name === p.name);
                    if (matchFlavor) occupiedInCart += matchFlavor.quantity;
                });
                const virtualStock = p.stock - occupiedInCart;
                const isOut = virtualStock <= 0;
                return `
                <div class="flex items-center justify-between py-3 gap-2">
                    <div class="flex-1 min-w-0">
                        <span class="font-bold text-stone-900 text-sm break-words block">${p.name}</span>
                        <span class="text-[#5B7290] font-black text-sm">$${p.price}</span>
                        <span class="text-[10px] ${isOut ? 'text-red-500 font-bold' : 'text-stone-400'} ml-0.5">剩 ${virtualStock >= 0 ? virtualStock : 0}</span>
                    </div>
                    <div class="shrink-0">
                        <input type="number" id="flavorQty_${idx}" data-idx="${idx}" min="0" max="${virtualStock >= 0 ? virtualStock : 0}" value="0" ${isOut ? 'disabled' : ''} class="flavor-input w-16 p-1 border border-stone-300 rounded-xl text-center text-sm font-black bg-white focus:outline-none h-9 disabled:bg-stone-100 disabled:text-stone-400" oninput="calculateCurrentBoxTotal(this)" onchange="calculateCurrentBoxTotal(this)">
                    </div>
                </div>`;
            }).join('');
        }

        function handleBoxChange() {
            const boxSelect = document.getElementById('boxSelect');
            const boxLimitTip = document.getElementById('boxLimitTip');
            if(boxSelect.value !== "") {
                const match = boxSelect.value.match(/\d+/);
                currentBoxLimit = match ? parseInt(match[0]) : null;
                boxLimitTip.innerText = currentBoxLimit ? `限 ${currentBoxLimit} 個` : "不限容量";
            } else {
                boxLimitTip.innerText = "";
                currentBoxLimit = null;
            }
            document.querySelectorAll('.flavor-input').forEach(input => input.value = "0");
            calculateCurrentBoxTotal(null); 
        }

        function calculateCurrentBoxTotal(currentInputObj) {
            const inputs = document.querySelectorAll('.flavor-input');
            let currentTotal = 0;
            inputs.forEach(input => { 
                let val = parseInt(input.value) || 0;
                if (val < 0) { input.value = "0"; val = 0; }
                currentTotal += val; 
            });
            if (currentBoxLimit && currentTotal > currentBoxLimit) {
                if (currentInputObj) {
                    alert(`數量超標！此組合限制容量為 ${currentBoxLimit} 個。`);
                    currentInputObj.value = "0"; 
                    currentTotal = 0;
                    inputs.forEach(input => { currentTotal += parseInt(input.value) || 0; });
                }
            }
            const display = document.getElementById('currentBoxCountDisplay');
            if (currentBoxLimit) {
                display.innerText = `已選: ${currentTotal} / ${currentBoxLimit} 個`;
                inputs.forEach(input => {
                    const idx = parseInt(input.getAttribute('data-idx'));
                    const product = localProducts[idx];
                    let occupiedInCart = 0;
                    cart.forEach(savedBox => {
                        const matchFlavor = savedBox.flavors.find(f => f.name === product.name);
                        if (matchFlavor) occupiedInCart += matchFlavor.quantity;
                    });
                    const virtualStock = product.stock - occupiedInCart;
                    const selfValue = parseInt(input.value) || 0;
                    let allowedMax = selfValue + (currentBoxLimit - currentTotal);
                    if (allowedMax > virtualStock) allowedMax = virtualStock;
                    input.max = allowedMax >= 0 ? allowedMax : 0;
                });
            } else { display.innerText = `已選: ${currentTotal} 個`; }
            return currentTotal;
        }

        function packBoxToCart() {
            const boxSelect = document.getElementById('boxSelect');
            if(boxSelect.value === "") { alert("請先挑選要使用的包裝類型！"); return; }
            const boxName = boxSelect.value;
            const boxExtra = parseInt(boxSelect.selectedOptions[0].getAttribute('data-extra')) || 0;
            const inputs = document.querySelectorAll('.flavor-input');
            let boxFlavors = [];
            let totalFlavorsCountInBox = 0;
            let boxFlavorsCost = 0;
            let hasError = false;
            
            for (let input of inputs) {
                const qty = parseInt(input.value) || 0;
                if (qty > 0) {
                    const idx = parseInt(input.getAttribute('data-idx'));
                    const product = localProducts[idx];
                    let occupiedInCart = 0;
                    cart.forEach(savedBox => {
                        const matchFlavor = savedBox.flavors.find(f => f.name === product.name);
                        if (matchFlavor) occupiedInCart += matchFlavor.quantity;
                    });
                    const virtualStock = product.stock - occupiedInCart;
                    if (qty > virtualStock) {
                        alert(`庫存不足！「${product.name}」最多只能再填入 ${virtualStock >= 0 ? virtualStock : 0} 個。`);
                        hasError = true; break;
                    }
                    boxFlavors.push({ name: product.name, price: product.price, quantity: qty });
                    totalFlavorsCountInBox += qty;
                    boxFlavorsCost += (product.price * qty);
                }
            }
            if (hasError) return;
            if(totalFlavorsCountInBox === 0) { alert("此組合內還沒有放入任何甜點喔！"); return; }
            if (currentBoxLimit && totalFlavorsCountInBox !== currentBoxLimit) {
                alert(`數量不符！「${boxName}」必須剛好裝滿 ${currentBoxLimit} 個品項。`);
                return;
            }
