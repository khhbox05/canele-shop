<!DOCTYPE html>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-amber-50/50 text-stone-800 min-h-screen">

    <nav class="bg-amber-800 text-amber-50 p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">🤎 可麗露工作室</h1>
            <div class="space-x-4">
                <button onclick="switchTab('front')" class="hover:underline cursor-pointer">前台下單</button>
                <button onclick="switchTab('back')" class="hover:underline cursor-pointer">後台管理</button>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:py-8">
        
        <section id="front-tab" class="space-y-6">
            <div class="text-center py-4">
                <h2 class="text-3xl font-extrabold text-amber-900 mb-2">本週限量可麗露預購</h2>
                <p class="text-stone-600">挑選喜愛的口味放入購物車，並選擇指定的取貨日期。</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-stone-100">
                <h3 class="text-lg font-bold text-amber-950 border-b pb-2 mb-4">🛒 第一步：挑選口味與數量</h3>
                <div id="productMenu" class="space-y-4">
                    <p class="text-stone-400 text-center py-4">商品載入中...</p>
                </div>
            </div>

            <form id="orderForm" class="bg-white p-6 rounded-2xl shadow-sm border border-stone-100 space-y-4" onsubmit="handleOrderSubmit(event)">
                <h3 class="text-lg font-bold text-amber-950 border-b pb-2">🛍️ 第二步：確認購物車明細</h3>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="bg-stone-50 text-stone-500">
                                <th class="p-2">商品口味</th>
                                <th class="p-2 w-20">單價</th>
                                <th class="p-2 w-20">數量</th>
                                <th class="p-2 w-20">小計</th>
                                <th class="p-2 w-12 text-center">刪除</th>
                            </tr>
                        </thead>
                        <tbody id="cartTableBody">
                            <tr>
                                <td colspan="5" class="p-4 text-center text-stone-400">購物車目前空空如也</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pt-2">
                    <label class="block text-sm font-medium mb-1 font-bold text-stone-700">選擇整體包裝方式 *</label>
                    <select id="packSelect" class="w-full p-2.5 border border-stone-200 rounded-lg bg-stone-50" onchange="calculateTotal()" required>
                        <option value="">載入中...</option>
                    </select>
                </div>

                <h3 class="text-lg font-bold text-amber-950 border-b pb-2 pt-4">📋 第三步：填寫訂購人資訊</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">訂購者姓名 *</label>
                        <input type="text" id="custName" class="w-full p-2.5 border border-stone-200 rounded-lg" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">聯絡電話 *</label>
                        <input type="tel" id="custPhone" class="w-full p-2.5 border border-stone-200 rounded-lg" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-amber-900 font-bold">取貨/寄送日期 * (限開放未來兩週)</label>
                        <select id="shipDate" class="w-full p-2.5 border border-amber-200 rounded-lg bg-amber-50/20 font-semibold" required>
                            </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">取貨方式 *</label>
                        <select id="shipMethod" class="w-full p-2.5 border border-stone-200 rounded-lg" onchange="toggleAddress()" required>
                            <option value="store">門市自取 (免運費)</option>
                            <option value="delivery">黑貓宅配 (運費另計)</option>
                        </select>
                    </div>
                </div>

                <div id="addressGroup" class="hidden">
                    <label class="block text-sm font-medium mb-1 text-amber-900">收件地址 *</label>
                    <input type="text" id="custAddress" class="w-full p-2.5 border border-amber-200 rounded-lg bg-amber-50/30" placeholder="請填寫完整宅配地址">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">備註說明</label>
                    <textarea id="orderNote" rows="2" class="w-full p-2.5 border border-stone-200 rounded-lg"></textarea>
                </div>

                <div class="bg-amber-100/60 p-4 rounded-xl space-y-1 text-right text-stone-700 font-medium">
                    <div>商品與包裝小計: <span id="subtotalDisplay">$0</span></div>
                    <div id="shipFeeDisplay" class="hidden">宅配運費: <span>+$160</span></div>
