<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilou 可麗露預購</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --brand-color: #5B7290;       
            --brand-dark: #3E4F66;        
            --brand-bg: #F4F6F9;          
            --brand-text-dark: #222222;   
        }
    </style>
</head>
<body class="bg-[#F4F6F9] text-[#222222] min-h-screen font-sans">

    <script>
        // ⚠️ 這裡請填入你在 Google Apps Script 部署得到的網頁應用程式網址
        const API_URL = "https://script.google.com/macros/s/AKfycbwbbwSO3VsgZdMZZ9NeVrp6T7Zkqla6GAq5Ge9LsKkcCoo_T1LnjO0wLS1XCBOAgOO_pQ/exec";
        let shippingFee = 160; 
        let cart = []; 
        let localProducts = []; 
        let localPackaging = [];
        let currentBoxLimit = null; // 當前選擇盒子的限制數量
    </script>

    <nav class="bg-[#5B7290] text-white p-5 shadow-sm sticky top-0 z-50">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-widest">Lilou</h1>
            <span class="text-sm border border-white/40 px-4 py-1.5 rounded-full text-white/90 tracking-wider font-medium">ONLINE SHOP</span>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:py-12 space-y-8">
        
        <section class="space-y-8">
            <div class="text-center py-4">
                <h2 class="text-4xl font-black text-[#222222] tracking-wider mb-4">本週限量可麗露預購</h2>
                <p class="text-stone-600 text-base md:text-lg tracking-wide max-w-xl mx-auto leading-relaxed">客製化挑選您的精緻禮盒，每週限量供應，手速要快！</p>
            </div>

            <div class="bg-white p-5 md:p-10 rounded-2xl shadow-xs border border-stone-100 space-y-6">
                <h3 class="text-lg font-extrabold text-[#5B7290] tracking-widest border-b-2 border-stone-100 pb-3.5 mb-2 uppercase">Step 01. 客製化您的禮盒組合</h3>
                
                <div>
                    <div class="flex justify-between items-baseline mb-2">
                        <label class="block text-sm font-black uppercase tracking-wider text-stone-700">1. 請先挑選這盒要使用的包裝盒型 *</label>
                        <span id="boxLimitTip" class="text-sm font-bold text-[#5B7290]"></span>
                    </div>
                    <select id="boxSelect" class="w-full p-4 border border-stone-300 rounded-xl bg-stone-50 focus:outline-none focus:border-[#5B7290] focus:ring-1 focus:ring-[#5B7290] text-base font-bold cursor-pointer h-14" onchange="handleBoxChange()">
                        <option value="">載入中...</option>
                    </select>
                </div>

                <div id="flavorSection" class="hidden space-y-4 pt-4 border-t border-stone-100">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-black uppercase tracking-wider text-[#5B7290]">2. 請挑選要放入此盒的可麗露口味與數量：</label>
                        <span id="currentBoxCountDisplay" class="text-base font-black text-stone-700">當前已選: 0 個</span>
                    </div>
                    <div id="flavorMenu" class="space-y-2">
                        </div>
                    
                    <div class="pt-4">
                        <button type="button" onclick="packBoxToCart()" class="w-full bg-[#5B7290] text-white font-extrabold tracking-widest p-4 rounded-xl hover:bg-[#3E4F66] transition-colors text-base uppercase shadow-sm cursor-pointer">
                            確認此盒口味，打包放入購物車
                        </button>
                    </div>
                </div>
            </div>

            <form id="orderForm" class="bg-white p-6 md:p-10 rounded-2xl shadow-xs border border-stone-100 space-y-8" onsubmit="handleOrderSubmit(event)">
                
                <div>
                    <h3 class="text-lg font-extrabold text-[#5B7290] tracking-widest border-b-2 border-stone-100 pb-3.5 mb-6 uppercase">Step 02. 確認已打包的禮盒明細</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-base min-w-[450px]">
                            <thead>
                                <tr class="border-b border-stone-200 text-stone-500 font-bold">
                                    <th class="p-3 pl-0">禮盒與內容物詳情</th>
                                    <th class="p-3 w-24 text-right">小計</th>
                                    <th class="p-3 w-16 text-center">刪除</th>
                                </tr>
                            </thead>
                            <tbody id="cartTableBody" class="divide-y divide-stone-100">
                                <tr>
                                    <td colspan="3" class="p-8 text-center text-stone-400 text-base">購物車目前空空的，請由上方客製化禮盒並打包進來喔！</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="space-y-6 pt-4">
                    <h3 class="text-lg font-extrabold text-[#5B7290] tracking-widest border-b-2 border-stone-100 pb-3.5 mb-6 uppercase">Step 03. 填寫訂購資訊</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-black uppercase tracking-wider text-stone-700 mb-2">訂購人姓名 *</label>
                            <input type="text" id="custName" class="w-full p-4 border border-stone-300 rounded-xl text-base focus:outline-none focus:border-[#5B7290] h-14" placeholder="請輸入姓名" required>
                        </div>
                        <div>
                            <label class="block text-sm font-black uppercase tracking-wider text-stone-700 mb-2">聯絡電話 *</label>
                            <input type="tel" id="custPhone" class="w-full p-4 border border-stone-300 rounded-xl text-base focus:outline-none focus:border-[#5B7290] h-14" placeholder="請輸入手機號碼" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-black uppercase tracking-wider text-stone-700 mb-2 text-[#5B7290]">取貨/寄送日期 *</label>
                            <select id="shipDate" class="w-full p-4 border border-stone-300 rounded-xl text-base focus:outline-none focus:border-[#5B7290] bg-white font-bold text-stone-800 cursor-pointer h-14" required>
                                </select>
                        </div>
                        <div>
                            <label class="block text-sm font-black uppercase tracking-wider text-stone-700 mb-2">配送方式 *</label>
                            <select id="shipMethod" class="w-full p-4 border border-stone-300 rounded-xl text-base focus:outline-none focus:border-[#5B7290] cursor-pointer h-14" onchange="toggleAddress()" required>
                                <option value="store">門市自取 (免運費)</option>
                                <option value="delivery">黑貓宅配 (運費另計)</option>
                            </select>
                        </div>
                    </div>

                    <div id="addressGroup" class="hidden transition-all duration-300">
                        <label class="block text-sm font-black uppercase tracking-wider text-stone-700 mb-2">宅配收件地址 *</label>
                        <input type="text" id="custAddress" class="w-full p-4 border border-stone-300 rounded-xl text-base focus:outline-none focus:border-[#5B7290] h-14" placeholder="請填寫完整收件地址">
                    </div>

                    <div>
                        <label class="block text-sm font-black uppercase tracking-wider text-stone-700 mb-2">備註說明</label>
                        <textarea id="orderNote" rows="3" class="w-full p-4 border border-stone-300 rounded-xl text-base focus:outline-none focus:border-[#5B7290]" placeholder="若有其他特殊需求請在此註記說明"></textarea>
                    </div>
                </div>

                <div class="bg-stone-50 p-6 rounded-xl space-y-2 text-right text-stone-600 text-sm tracking-wide border border-stone-100">
                    <div>全品項含禮盒總計 Subtotal: <span id="subtotalDisplay" class="font-bold text-base text-stone-800">$0</span></div>
                    <div id="shipFeeDisplay" class="hidden">宅配運費 Shipping: <span class="font-bold text-base text-stone-800">+$160</span></div>
                    <div class="text-[#222222] font-black text-2xl pt-3 border-t border-stone-200 mt-3">
                        總金額 Total：<span id="totalDisplay" class="text-2xl font-black text-[#5B7290]">$0</span>
                    </div>
                </div>

                <button type="submit" class="w-full bg-[#5B7290] text-white font-extrabold tracking-widest p-4.5 rounded-xl hover:bg-[#3E4F66] transition-colors duration-200 shadow-md cursor-pointer text-base uppercase">
                    送出預購訂單 Submit Order
                </button>
            </form>
        </section>
    </main>

    <script>
        function toggleAddress() {
            const method = document.getElementById('shipMethod').value;
            const addrGroup = document.getElementById('addressGroup');
            const addrInput = document.getElementById('custAddress');
            const shipFeeDisplay = document.getElementById('shipFeeDisplay');
            
            if(method === 'delivery') {
                addrGroup.classList.remove('hidden');
                addrInput.required = true;
                shipFeeDisplay.classList.remove('hidden');
                shipFeeDisplay.querySelector('span').innerText = `+$${shippingFee}`;
            } else {
                addrGroup.classList.add('hidden');
                addrInput.required = false;
                addrInput.value = "";
                shipFeeDisplay.classList.add('hidden');
            }
            calculateTotal();
        }

        function parseAndRenderCustomDates(dateString) {
            const dateSelect = document.getElementById('shipDate');
            let optionsHtml = `<option value="" disabled selected>-- 請選擇取貨/寄送日期 --</option>`;
            if(dateString && dateString.trim() !== "") {
                const dateArr = dateString.split(',');
                dateArr.forEach(dStr => {
                    const cleanDate = dStr.trim();
                    if(cleanDate !== "") {
                        const parts = cleanDate.split('-');
                        if(parts.length === 3) {
                            const dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
                            const weekday = ["日", "一", "二", "三", "四", "五", "六"][dateObj.getDay()];
                            optionsHtml += `<option value="${cleanDate}">${cleanDate} (星期${weekday})</option>`;
                        } else {
                            optionsHtml += `<option value="${cleanDate}">${cleanDate}</option>`;
                        }
                    }
                });
            } else {
                optionsHtml = `<option value="" disabled>目前無開放日期，請聯繫店家</option>`;
            }
            dateSelect.innerHTML = optionsHtml;
        }

        async function fetchOptions() {
            try {
                const res = await fetch(`${API_URL}?action=getFormOptions`);
                const data = await res.json();
                localProducts = data.products;
                localPackaging = data.packaging;
                
                let rawDateSetting = "";
                if(data.settings) {
                    rawDateSetting = data.settings.available_dates || "";
                }

                const boxSelect = document.getElementById('boxSelect');
                boxSelect.innerHTML = `<option value="" disabled selected>-- 請選擇這一個禮盒的包裝樣式 --</option>` + localPackaging.map(p => 
                    `<option value="${p.name}" data-extra="${p.extra_price}">${p.name} (+$${p.extra_price})</option>`
                ).join('');

                parseAndRenderCustomDates(rawDateSetting);
                renderFlavorMenu();
                renderCart();
            } catch (err) {
                alert("數據載入失敗，請確認 Apps Script 網址是否正確。");
            }
        }

        function renderFlavorMenu() {
            const fMenu = document.getElementById('flavorMenu');
            fMenu.innerHTML = localProducts.map((p, idx) => {
                let occupiedInCart = 0;
                cart.forEach(savedBox => {
                    const matchFlavor = savedBox.flavors.find(f => f.name === p.name);
                    if (matchFlavor) occupiedInCart += matchFlavor.quantity;
                });

                const virtualStock = p.stock - occupiedInCart;
                const isOut = virtualStock <= 0;

                return `
                <div class="flex flex-col md:flex-row md:items-center justify-between py-3 border-b border-stone-100 last:border-0 gap-2">
                    <div class="flex-1 min-w-0">
                        <span class="font-bold text-stone-900 text-base break-words">${p.name}</span>
                        <span class="text-[#5B7290] font-bold text-base ml-2">$${p.price}</span>
                    </div>
                    <div class="flex items-center gap-4 justify-between md:justify-end">
                        <span class="text-xs ${isOut ? 'text-red-500 font-bold' : 'text-stone-400'}">
                            剩餘：${virtualStock >= 0 ? virtualStock : 0} 顆 ${isOut ? '(售罄)' : ''}
                        </span>
                        <input type="number" id="flavorQty_${idx}" data-[#idx]="${idx}" min="0" max="${virtualStock >= 0 ? virtualStock : 0}" value="0" ${isOut ? 'disabled' : ''} class="flavor-input w-16 p-2 border border-stone-300 rounded-xl text-center text-base font-bold bg-white focus:outline-none h-10 disabled:bg-stone-100 disabled:text-stone-400" onchange="calculateCurrentBoxTotal()">
                    </div>
                </div>`;
            }).join('');
        }

        // 💡 核心功能：當使用者換盒子時，自動提取文字中的數字（例如 8入禮盒 ➡️ 8）
        function handleBoxChange() {
            const boxSelect = document.getElementById('boxSelect');
            const fSection = document.getElementById('flavorSection');
            const boxLimitTip = document.getElementById('boxLimitTip');
            
            if(boxSelect.value !== "") {
                fSection.classList.remove('hidden');
                
                // 正則表達式抓取文字中的連續數字
                const match = boxSelect.value.match(/\d+/);
                if (match) {
                    currentBoxLimit = parseInt(match[0]);
                    boxLimitTip.innerText = `此包裝限制容量：${currentBoxLimit} 個`;
                } else {
                    currentBoxLimit = null; // 代表不限容量（如單顆自用袋裝）
                    boxLimitTip.innerText = "此包裝不限制容量";
                }
            } else {
                fSection.classList.add('hidden');
                boxLimitTip.innerText = "";
                currentBoxLimit = null;
            }
            
            // 換盒子時把輸入框歸零並重算
            const inputs = document.querySelectorAll('.flavor-input');
            inputs.forEach(input => input.value = "0");
            calculateCurrentBoxTotal();
        }

        // 💡 核心功能：即時監聽並更新當前這盒塞了幾個
        function calculateCurrentBoxTotal() {
            const inputs = document.querySelectorAll('.flavor-input');
            let currentTotal = 0;
            inputs.forEach(input => {
                currentTotal += parseInt(input.value) || 0;
            });

            const display = document.getElementById('currentBoxCountDisplay');
            if (currentBoxLimit) {
                display.innerText = `當前已選: ${currentTotal} / ${currentBoxLimit} 個`;
                
                // 動態限制 max 上限，不讓使用者往上按超過空位
                inputs.forEach(input => {
                    const idx = parseInt(input.getAttribute('data-[#idx]'));
                    const product = localProducts[idx];
                    
                    let occupiedInCart = 0;
                    cart.forEach(savedBox => {
                        const matchFlavor = savedBox.flavors.find(f => f.name === product.name);
                        if (matchFlavor) occupiedInCart += matchFlavor.quantity;
                    });
                    const virtualStock = product.stock - occupiedInCart;
                    
                    const selfValue = parseInt(input.value) || 0;
                    const leftSpaceInBox = currentBoxLimit - currentTotal;
                    
                    // 新的最大上限是「自身目前的量 + 盒子剩餘空位」或「虛擬庫存量」兩者取小的
                    const newMax = Math.min(selfValue + leftSpaceInBox, virtualStock);
                    input.max = newMax >= 0 ? newMax : 0;
                });
            } else {
                display.innerText = `當前已選: ${currentTotal} 個`;
            }
            
            return currentTotal;
        }

        // 打包禮盒加入購物車（新增盒容量精準限制防呆）
        function packBoxToCart() {
            const boxSelect = document.getElementById('boxSelect');
            const boxName = boxSelect.value;
            const boxExtra = parseInt(boxSelect.selectedOptions[0].getAttribute('data-extra')) || 0;

            const inputs = document.querySelectorAll('.flavor-input');
            let boxFlavors = [];
            let totalFlavorsCountInBox = 0;
            let boxFlavorsCost = 0;
            let hasError = false;

            for (let input of inputs) {
                const qty = parseInt(input.value) || 0;
                if (qty > 0) {
                    const idx = parseInt(input.getAttribute('data-[#idx]'));
                    const product = localProducts[idx];

                    let occupiedInCart = 0;
                    cart.forEach(savedBox => {
                        const matchFlavor = savedBox.flavors.find(f => f.name === product.name);
                        if (matchFlavor) occupiedInCart += matchFlavor.quantity;
                    });

                    const virtualStock = product.stock - occupiedInCart;

                    if (qty > virtualStock) {
                        alert(`庫存不足！「${product.name}」目前最多只能再填入 ${virtualStock >= 0 ? virtualStock : 0} 顆。`);
                        hasError = true;
                        break;
                    }

                    boxFlavors.push({ name: product.name, price: product.price, quantity: qty });
                    totalFlavorsCountInBox += qty;
                    boxFlavorsCost += (product.price * qty);
                }
            }

            if (hasError) return;

            if(totalFlavorsCountInBox === 0) {
                alert("這一盒裡面還沒有裝任何顆可麗露喔！請先輸入口味數量。");
                return;
            }

            // 💡 核心防呆：如果包裝名稱有指定限制數量，總和必須完全精準相等才放行
            if (currentBoxLimit && totalFlavorsCountInBox !== currentBoxLimit) {
                alert(`數量不符！您選擇的是「${boxName}」，這盒必須剛好裝滿 ${currentBoxLimit} 個品項。目前裝了 ${totalFlavorsCountInBox} 個，請調整後再打包。`);
                return;
            }

            cart.push({
                boxName: boxName,
                boxExtra: boxExtra,
                flavors: boxFlavors,
                flavorsCost: boxFlavorsCost,
                totalQty: totalFlavorsCountInBox,
                boxTotalCost: boxFlavorsCost + boxExtra
            });

            alert(`成功打包第 ${cart.length} 盒放入明細！`);
            boxSelect.value = "";
            document.getElementById('flavorSection').classList.add('hidden');
            document.getElementById('boxLimitTip').innerText = "";
            currentBoxLimit = null;
            
            renderFlavorMenu();
            renderCart();
        }

        function removeFromCart(cartIdx) {
            cart.splice(cartIdx, 1);
            renderFlavorMenu();
            renderCart();
        }

        function renderCart() {
            const cBody = document.getElementById('cartTableBody');
            if(cart.length === 0) {
                cBody.innerHTML = `<tr><td colspan="3" class="p-6 text-center text-stone-400 text-base">購物車目前空空的，請由上方客製化禮盒並打包進來喔！</td></tr>`;
                calculateTotal(); return;
            }

            cBody.innerHTML = cart.map((box, i) => {
                const flavorDetailHtml = box.flavors.map(f => `${f.name} x ${f.quantity}顆`).join('、');
                return `
                <tr class="text-stone-700">
                    <td class="py-4 pr-3">
                        <div class="font-extrabold text-base text-stone-900 tracking-wide">組合 ${i+1}：${box.boxName} (+$${box.boxExtra})</div>
                        <div class="text-sm text-[#5B7290] font-bold mt-1 pl-4">內含口味：${flavorDetailHtml} (共 ${box.totalQty} 顆)</div>
                    </td>
                    <td class="py-4 text-right font-black text-base text-stone-900">$${box.boxTotalCost}</td>
                    <td class="py-4 text-center">
                        <button type="button" onclick="removeFromCart(${i})" class="text-stone-400 hover:text-red-500 font-black text-lg transition-colors cursor-pointer px-3">✕</button>
                    </td>
                </tr>
                `;
            }).join('');

            calculateTotal();
        }

        function calculateTotal() {
            let subtotal = 0;
            cart.forEach(box => { subtotal += box.boxTotalCost; });
            document.getElementById('subtotalDisplay').innerText = `$${subtotal}`;
            const shipMethod = document.getElementById('shipMethod').value;
            let finalTotal = subtotal;
            if(shipMethod === 'delivery') finalTotal += shippingFee;
            document.getElementById('totalDisplay').innerText = `$${finalTotal}`;
            return finalTotal;
        }

        async function handleOrderSubmit(e) {
            e.preventDefault();
            if(cart.length === 0) { 
                alert("明細中還沒有任何打包好的禮盒，請先至 Step 01 組裝並打包禮盒！"); 
                return; 
            }

            const orderProductSummary = cart.map((box, i) => {
                const flavorsStr = box.flavors.map(f => `${f.name}(${f.quantity}個)`).join('、');
                return `【第${i+1}盒: ${box.boxName}】${flavorsStr}`;
            }).join(' ｜ ');

            const orderPackSummary = cart.map((box, i) => `[盒${i+1}]${box.boxName}`).join('、');
            const totalQtyAll = cart.reduce((sum, box) => sum + box.totalQty, 0);

            const orderData = {
                action: "submitOrder",
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                date: document.getElementById('shipDate').value,
                shipping_method: document.getElementById('shipMethod').value === 'store' ? "門市自取" : "黑貓宅配",
                address: document.getElementById('custAddress').value,
                product_name: orderProductSummary, 
                quantity: totalQtyAll,              
                packaging_name: orderPackSummary,   
                total_price: calculateTotal(),
                note: document.getElementById('orderNote').value
            };

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(orderData) });
                const result = await res.json();
                if(result.status === "success") {
                    alert("預購單送出成功！已為您保留數量。");
                    cart = [];
                    document.getElementById('orderForm').reset();
                    document.getElementById('addressGroup').classList.add('hidden');
                    document.getElementById('shipFeeDisplay').classList.add('hidden');
                    fetchOptions(); 
                }
            } catch(err) { alert("送出訂單時發生錯誤，請稍後再試。"); }
        }

        fetchOptions();
    </script>
</body>
</html>
